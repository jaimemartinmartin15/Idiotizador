name: Build And Deploy
run-name: Deploy Idiotizador to AWS S3

on:
  workflow_dispatch: # allow manual trigger
  push:
    tags: ['[1-9].[0-9][0-9]?.[0-9][0-9]?']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install html-minifier-terser --save-dev
      - name: Optimice files
        run: |
          mkdir -p dist
          npx html-minifier-terser index.html -o dist/index.html --collapse-whitespace --remove-comments --minify-css true --minify-js true
          cp favicons dist/favicons/
      - name: Set AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          mask-aws-account-id: true
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2
      - name: Deploy
        run: |
          aws --version
          aws s3 sync ./dist/ \
                      s3://jaimeelingeniero.es/idiotizador \
                      --delete
